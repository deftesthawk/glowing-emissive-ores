<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#121212">
  <title>Glowing Emissive Ores</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script>
    (function () {
      try {
        var hostname = document.referrer
          ? new URL(document.referrer).hostname.toLowerCase()
          : '';

        if (hostname === 'modrinth.com' || hostname.endsWith('.modrinth.com')) {
          localStorage.setItem('geoPreferredPlatform', 'modrinth');
        } else if (hostname === 'curseforge.com' || hostname.endsWith('.curseforge.com')) {
          localStorage.setItem('geoPreferredPlatform', 'curseforge');
        }
      } catch (error) {
        // Continue to the website even when referrer or storage access is blocked.
      }

      window.location.replace('requirements-all/');
    }());
  </script>
</head>
<body>
  <p><a href="requirements-all/">Open the requirements page</a></p>
</body>
</html>
