<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#121212">
  <title>Glowing Emissive Ores</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script>
    (function () {
      var variantStorageKey = 'geoPreferredVariant';
      var allowedVariants = ['resource-pack', 'mod'];
      var url = new URL(window.location.href);
      var requestedVariant = url.searchParams.get('variant');
      var selectedVariant = allowedVariants.indexOf(requestedVariant) !== -1
        ? requestedVariant
        : null;

      try {
        var hostname = document.referrer
          ? new URL(document.referrer).hostname.toLowerCase()
          : '';

        if (hostname === 'modrinth.com' || hostname.endsWith('.modrinth.com')) {
          localStorage.setItem('geoPreferredPlatform', 'modrinth');
        } else if (hostname === 'curseforge.com' || hostname.endsWith('.curseforge.com')) {
          localStorage.setItem('geoPreferredPlatform', 'curseforge');
        }
      } catch (error) {
        // Continue when referrer or storage access is blocked.
      }

      if (!selectedVariant) {
        try {
          var storedVariant = localStorage.getItem(variantStorageKey);
          if (allowedVariants.indexOf(storedVariant) !== -1) {
            selectedVariant = storedVariant;
          }
        } catch (error) {
          // Continue when storage access is blocked.
        }
      }

      if (!selectedVariant && document.referrer) {
        try {
          var referrer = new URL(document.referrer);
          var hostname = referrer.hostname.toLowerCase();
          var pathname = referrer.pathname.toLowerCase();
          var isCurseForge = hostname === 'curseforge.com' || hostname.endsWith('.curseforge.com');
          var isModrinth = hostname === 'modrinth.com' || hostname.endsWith('.modrinth.com');

          if ((isCurseForge && pathname.includes('/minecraft/mc-mods/')) ||
              (isModrinth && pathname.startsWith('/mod/'))) {
            selectedVariant = 'mod';
          } else if ((isCurseForge && pathname.includes('/minecraft/texture-packs/')) ||
                     (isModrinth && pathname.startsWith('/resourcepack/'))) {
            selectedVariant = 'resource-pack';
          }
        } catch (error) {
          // Ignore unavailable or malformed referrer values.
        }
      }

      selectedVariant = selectedVariant || 'resource-pack';

      try {
        localStorage.setItem(variantStorageKey, selectedVariant);
      } catch (error) {
        // Pass the requested variant through the redirect when storage is blocked.
      }

      var destination = selectedVariant === 'mod'
        ? 'supported/'
        : 'requirements-all/';

      // Pass the selection through the redirect so it still works when storage
      // or referrer information is unavailable. The destination removes it.
      destination += '?variant=' + encodeURIComponent(selectedVariant);
      window.location.replace(destination);
    }());
  </script>
</head>
<body>
  <p><a href="requirements-all/">Open the Glowing Emissive Ores website</a></p>
</body>
</html>
